<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Button</title>
</head>
<body>

    <main>

        <div class="center">
            <div class="button-base"></div>
            <button class="btn" id="button">0</button>
        </div>

    </main>

    <div class="corner">
        <p>MAX: <span id="max-displayer">0</span></p>
        <p>TOTAL: <span id="total-displayer">0</span></p>
        <p>RESETS: <span id="resets-displayer">0</span></p>
    </div>

    <div class="settings-corner">
        <button id="settings-btn">Settings</button>
    </div>

    <div class="settings-panel" id="set-s">
        <p>Settings</p>
        <div class="grid">
            <button class="btn-color" id="blueBtn"></button>
            <button class="btn-color" id="redBtn"></button>
            <button class="btn-color" id="pinkBtn"></button>
            <button class="btn-color" id="yellowBtn"></button>
            <button class="btn-color" id="summerBtn"></button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
